name: Bug report
description: Something does not work as documented
body:
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release tag or commit hash you are running
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, GPU if relevant
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands or workflow, expected result, actual result
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      render: shell
